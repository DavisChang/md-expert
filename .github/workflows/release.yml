name: Release

# 上版環節：建置 + 打包 zip。發布到 Chrome Web Store 受 production environment 保護，
# 需指定 reviewer（你）按核可後才執行，對應「AI 自動開發、人工 review 後上線」。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm zip
      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: markdown-expert-v*.zip
          retention-days: 30

  publish:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    # 受保護環境：在 repo Settings > Environments > production 設定 required reviewers。
    environment: production
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extension-zip
      - name: Upload & submit
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          ZIP=$(ls markdown-expert-v*.zip | head -n1)
          echo "準備上傳 $ZIP 到 Chrome Web Store（extension: $CWS_EXTENSION_ID）"
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "$ZIP" \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN"
          # 預設僅上傳為草稿；確認無誤後再加 `publish` 子指令送審。
