name: Deploy Website

# 把 site/ 部署到 GitHub Pages（產品官網 + 隱私政策頁）。
on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - name: Upload site/
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
