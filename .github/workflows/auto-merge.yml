name: Auto-merge

# 當 CI 與 E2E 兩個 workflow 對同一個 PR commit 都跑成功後，
# 自動 squash-merge 進 main。發布（release）仍走 production 人工核可，不受此影響。
#
# 前置設定（一次性）：
#   Settings → Actions → General → Workflow permissions → 選「Read and write permissions」。
# 安全界線：只自動合併「指向 main、非 draft、且來自本倉庫（非 fork）」的 PR。

on:
  workflow_run:
    workflows: [CI, E2E]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

# 以 head SHA 分組並序列化：CI 與 E2E 兩次完成事件不會同時搶著合併。
concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  auto-merge:
    # 只處理 PR 觸發、且本次 workflow 成功的完成事件。
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR when CI + E2E are both green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          REQUIRED=(ci.yml e2e.yml)
          echo "Head SHA: $SHA"

          # 1) 每個必需 workflow 對此 SHA 的最新結果都必須是 success。
          for wf in "${REQUIRED[@]}"; do
            concl=$(gh api "repos/$REPO/actions/workflows/$wf/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "missing"')
            echo "  $wf => $concl"
            if [ "$concl" != "success" ]; then
              echo "尚未全綠（$wf=$concl），暫不合併。"
              exit 0
            fi
          done

          # 2) 找此 SHA 對應、指向 main、非 draft、非 fork 的開啟中 PR。
          pr=$(gh api "repos/$REPO/commits/$SHA/pulls" \
            --jq '[.[] | select(.state=="open" and .base.ref=="main" and .draft==false
                                 and (.head.repo.full_name == .base.repo.full_name))][0].number // empty')
          if [ -z "$pr" ]; then
            echo "找不到符合條件的開啟中 PR，略過。"
            exit 0
          fi

          # 3) 等 GitHub 算出 mergeable 狀態（最多約 20s），避開 UNKNOWN 競態。
          for _ in 1 2 3 4 5; do
            state=$(gh pr view "$pr" --repo "$REPO" --json mergeable,state \
              --jq '.mergeable + ":" + .state')
            echo "  PR #$pr state: $state"
            case "$state" in
              MERGEABLE:OPEN) break ;;
              CONFLICTING:*) echo "有衝突，無法自動合併。"; exit 1 ;;
              *:MERGED|*:CLOSED) echo "PR 已關閉/合併，略過。"; exit 0 ;;
            esac
            sleep 4
          done

          echo "CI + E2E 全綠，squash-merge PR #$pr"
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
